# Server settings
server.port=8080

# H2 Database settings
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Settings
# Secret key (Base64 encoded)
app.jwtSecret=6368616c6c656e67652d7365637265742d6b65792d323032342d6465616462656566
# Expiration: 15 minutes = 900000ms
app.jwtExpirationMs=900000
# Refresh Expiration: 7 days = 604800000ms
app.jwtRefreshExpirationMs=604800000

# Logging
logging.level.org.springframework.security=DEBUG
