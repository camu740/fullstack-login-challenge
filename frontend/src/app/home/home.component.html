<div class="home-container">
  <div class="home-card">
    <div class="logo-header">
      <img src="assets/images/logos/Logo-RD.svg" alt="Realdooh Logo" class="home-logo">
      
      <div class="language-selector">
        <button mat-button [matMenuTriggerFor]="menu" class="lang-btn">
          <mat-icon>public</mat-icon>
          <span>{{ currentLang | uppercase }}</span>
        </button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item (click)="switchLang('es')">ES</button>
          <button mat-menu-item (click)="switchLang('en')">EN</button>
          <button mat-menu-item (click)="switchLang('fr')">FR</button>
          <button mat-menu-item (click)="switchLang('pt')">PT</button>
        </mat-menu>
      </div>
    </div>

    <div class="welcome-section">
      <h1 class="welcome-title">
        {{ 'HOME.WELCOME' | translate }}, <span class="user-highlight">{{ user?.username }}</span>!
      </h1>
      <p class="welcome-subtitle">{{ 'HOME.SUCCESS_MESSAGE' | translate }}</p>
    </div>

    <div class="user-info-section">
      <div class="info-item">
        <mat-icon>email</mat-icon>
        <div class="info-text">
          <span class="label">{{ 'HOME.EMAIL' | translate }}</span>
          <span class="value">{{ user?.username }}</span>
        </div>
      </div>
      <div class="info-item">
        <mat-icon>verified_user</mat-icon>
        <div class="info-text">
          <span class="label">{{ 'HOME.ROLES' | translate }}</span>
          <div class="roles-chips">
            <span class="role-chip" *ngFor="let role of user?.roles">{{ role }}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="actions-section">
      <button mat-flat-button color="warn" class="logout-button" (click)="logout()">
        <mat-icon>logout</mat-icon>
        {{ 'HOME.LOGOUT' | translate }}
      </button>
    </div>
  </div>
</div>
